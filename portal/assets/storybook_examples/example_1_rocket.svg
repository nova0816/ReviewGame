<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 375" width="100%" height="100%">
  <defs>
    <linearGradient id="spaceBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a237e" />
      <stop offset="60%" stop-color="#283593" />
      <stop offset="100%" stop-color="#4527a0" />
    </linearGradient>
    <linearGradient id="rocketBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff1744" />
      <stop offset="50%" stop-color="#ff5252" />
      <stop offset="100%" stop-color="#d50000" />
    </linearGradient>
    <linearGradient id="fireGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffea00" />
      <stop offset="50%" stop-color="#ff9100" />
      <stop offset="100%" stop-color="#ff3d00" />
    </linearGradient>
    <filter id="shadow1" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.35" />
    </filter>
    <filter id="glow1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Space Background -->
  <rect width="500" height="375" rx="28" fill="url(#spaceBg)" />

  <!-- Moon in Corner -->
  <g filter="url(#shadow1)">
    <circle cx="410" cy="90" r="45" fill="#fff59d" />
    <circle cx="395" cy="80" r="10" fill="#ffee58" opacity="0.6" />
    <circle cx="425" cy="105" r="12" fill="#ffee58" opacity="0.6" />
    <circle cx="415" cy="70" r="6" fill="#ffee58" opacity="0.6" />
  </g>

  <!-- Twinkling Stars -->
  <g fill="#ffffff" opacity="0.9">
    <path d="M 80 50 L 83 60 L 93 63 L 83 66 L 80 76 L 77 66 L 67 63 L 77 60 Z" />
    <path d="M 220 40 L 222 47 L 229 49 L 222 51 L 220 58 L 218 51 L 211 49 L 218 47 Z" />
    <path d="M 330 150 L 332 155 L 337 157 L 332 159 L 330 164 L 328 159 L 323 157 L 328 155 Z" />
    <path d="M 70 280 L 72 287 L 79 289 L 72 291 L 70 298 L 68 291 L 61 289 L 68 287 Z" />
    <circle cx="150" cy="120" r="3" />
    <circle cx="280" cy="100" r="4" />
    <circle cx="440" cy="220" r="3" />
    <circle cx="120" cy="220" r="2" />
  </g>

  <!-- Colorful Planet Saturn -->
  <g filter="url(#shadow1)">
    <ellipse cx="100" cy="180" rx="45" ry="14" fill="#ab47bc" transform="rotate(-20 100 180)" opacity="0.8" />
    <circle cx="100" cy="180" r="24" fill="#ec407a" />
    <ellipse cx="100" cy="180" rx="45" ry="14" fill="none" stroke="#e1bee7" stroke-width="5" transform="rotate(-20 100 180)" />
  </g>

  <!-- Rocket Exhaust Fire Stream -->
  <g filter="url(#glow1)">
    <path d="M 170 230 C 130 260, 90 280, 50 310 C 100 300, 140 270, 190 240 Z" fill="url(#fireGrad)" />
    <path d="M 180 232 C 150 250, 120 265, 90 285 C 130 275, 155 255, 195 238 Z" fill="#fff59d" />
  </g>

  <!-- Cute Rocket Character -->
  <g filter="url(#shadow1)" transform="rotate(-25 250 180)">
    <!-- Wings/Fins -->
    <path d="M 200 190 L 160 230 L 210 215 Z" fill="#00e5ff" stroke="#00b0ff" stroke-width="3" />
    <path d="M 290 190 L 330 230 L 280 215 Z" fill="#00e5ff" stroke="#00b0ff" stroke-width="3" />
    
    <!-- Main Body -->
    <path d="M 210 210 L 210 140 C 210 80, 245 40, 245 40 C 245 40, 280 80, 280 140 L 280 210 Z" fill="url(#rocketBody)" stroke="#b71c1c" stroke-width="5" />
    
    <!-- White Belly Panel -->
    <path d="M 225 200 L 225 140 C 225 100, 245 70, 245 70 C 245 70, 265 100, 265 140 L 265 200 Z" fill="#ffffff" />

    <!-- Cute Round Porthole Window -->
    <circle cx="245" cy="130" r="22" fill="#80d8ff" stroke="#0091ea" stroke-width="5" />
    <circle cx="245" cy="130" r="16" fill="#40c4ff" />
    <!-- Character inside window: Cute smiling astronaut bear -->
    <circle cx="245" cy="132" r="11" fill="#ffcc80" />
    <circle cx="241" cy="130" r="2" fill="#263238" />
    <circle cx="249" cy="130" r="2" fill="#263238" />
    <path d="M 243 136 Q 245 139, 247 136" stroke="#d84315" stroke-width="1.5" fill="none" />
    <!-- Window Shine -->
    <path d="M 233 120 A 16 16 0 0 1 257 120" stroke="#ffffff" stroke-width="3" stroke-linecap="round" fill="none" />

    <!-- Cute Rocket Nose Cone -->
    <path d="M 230 70 C 235 50, 245 40, 245 40 C 245 40, 255 50, 260 70 Z" fill="#ffea00" />
  </g>
</svg>
