<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 375" width="100%" height="100%">
  <defs>
    <linearGradient id="freezeBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b2ebf2" />
      <stop offset="60%" stop-color="#80deea" />
      <stop offset="100%" stop-color="#4dd0e1" />
    </linearGradient>
    <filter id="shadow3" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#006064" flood-opacity="0.25" />
    </filter>
    <filter id="iceGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="500" height="375" rx="28" fill="url(#freezeBg)" />

  <!-- Snow Floor -->
  <path d="M 0 260 Q 250 240, 500 270 L 500 375 L 0 375 Z" fill="#ffffff" opacity="0.9" />

  <!-- Falling Snowflakes -->
  <g fill="#ffffff" filter="url(#iceGlow)" opacity="0.9">
    <!-- Snowflake 1 -->
    <path d="M 100 80 L 100 120 M 80 100 L 120 100 M 86 86 L 114 114 M 86 114 L 114 86" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
    <!-- Snowflake 2 -->
    <path d="M 380 60 L 380 90 M 365 75 L 395 75 M 370 65 L 390 85 M 370 85 L 390 65" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
    <!-- Snowflake 3 -->
    <path d="M 420 180 L 420 210 M 405 195 L 435 195" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
    <!-- Dots -->
    <circle cx="200" cy="70" r="5" fill="#ffffff" />
    <circle cx="300" cy="110" r="4" fill="#ffffff" />
    <circle cx="70" cy="180" r="6" fill="#ffffff" />
    <circle cx="250" cy="190" r="5" fill="#ffffff" />
  </g>

  <!-- Ice Crystals on Side -->
  <g filter="url(#iceGlow)">
    <polygon points="30,375 50,250 70,375" fill="#e0f7fa" stroke="#80deea" stroke-width="2" />
    <polygon points="65,375 85,280 105,375" fill="#b2ebf2" stroke="#80deea" stroke-width="2" />
    <polygon points="410,375 430,260 450,375" fill="#e0f7fa" stroke="#80deea" stroke-width="2" />
  </g>

  <!-- Cute Shivering Penguin Character -->
  <g filter="url(#shadow3)">
    <!-- Shadow -->
    <ellipse cx="250" cy="325" rx="45" ry="12" fill="#80deea" opacity="0.6" />
    
    <!-- Body -->
    <ellipse cx="250" cy="235" rx="50" ry="70" fill="#263238" />
    <ellipse cx="250" cy="245" rx="35" ry="50" fill="#ffffff" />

    <!-- Cute Shivering Wings holding chest -->
    <path d="M 205 210 C 180 240, 215 260, 230 250" fill="#263238" stroke="#102027" stroke-width="3" />
    <path d="M 295 210 C 320 240, 285 260, 270 250" fill="#263238" stroke="#102027" stroke-width="3" />

    <!-- Feet -->
    <ellipse cx="230" cy="305" rx="14" ry="7" fill="#ffb300" />
    <ellipse cx="270" cy="305" rx="14" ry="7" fill="#ffb300" />

    <!-- Cute Head -->
    <circle cx="250" cy="160" r="40" fill="#263238" />
    <circle cx="250" cy="168" r="30" fill="#ffffff" />
    
    <!-- Rosy Cheeks -->
    <circle cx="230" cy="172" r="6" fill="#80deea" />
    <circle cx="270" cy="172" r="6" fill="#80deea" />

    <!-- Eyes (Shivering/Blinking cute lines) -->
    <circle cx="238" cy="162" r="5" fill="#263238" />
    <circle cx="236" cy="160" r="2" fill="#ffffff" />
    <circle cx="262" cy="162" r="5" fill="#263238" />
    <circle cx="260" cy="160" r="2" fill="#ffffff" />

    <!-- Orange Beak -->
    <polygon points="244,168 256,168 250,178" fill="#ff9800" stroke="#f57c00" stroke-width="2" />

    <!-- Warm Red Striped Scarf -->
    <path d="M 210 185 C 230 200, 270 200, 290 185 L 285 210 C 265 220, 235 220, 215 210 Z" fill="#ff1744" stroke="#d50000" stroke-width="3" />
    <path d="M 270 205 L 285 260 L 260 260 L 250 205 Z" fill="#ff1744" stroke="#d50000" stroke-width="3" />
    <!-- Scarf Fringe -->
    <line x1="262" y1="260" x2="262" y2="270" stroke="#ffffff" stroke-width="3" />
    <line x1="270" y1="260" x2="270" y2="270" stroke="#ffffff" stroke-width="3" />
    <line x1="278" y1="260" x2="278" y2="270" stroke="#ffffff" stroke-width="3" />

    <!-- Shivering Sound Lines BRRR! -->
    <path d="M 180 150 Q 170 155, 180 160 T 180 170" stroke="#00838f" stroke-width="3" stroke-linecap="round" fill="none" />
    <path d="M 320 150 Q 330 155, 320 160 T 320 170" stroke="#00838f" stroke-width="3" stroke-linecap="round" fill="none" />
    <text x="325" y="145" font-family="sans-serif" font-weight="bold" font-size="16" fill="#00838f">Brrr! ❄️</text>
  </g>
</svg>
