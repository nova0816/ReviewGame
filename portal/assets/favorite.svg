  <path d="M 60 50 L 65 60 L 75 65 L 65 70 L 60 80 L 55 70 L 45 65 L 55 60 Z" fill="#fff" opacity="0.9" />
  <!-- Sparkle 2 -->
  <path d="M 330 180 L 333 186 L 340 189 L 333 192 L 330 198 L 327 192 L 320 189 L 327 186 Z" fill="#fff" opacity="0.9" />
  <!-- Sparkle 3 -->
  <path d="M 120 180 L 122 184 L 127 186 L 122 188 L 120 192 L 118 188 L 113 186 L 118 184 Z" fill="#ff80ab" opacity="0.9" />
  <!-- Sparkle 4 -->
  <path d="M 280 40 L 282 44 L 287 46 L 282 48 L 280 52 L 278 48 L 273 46 L 278 44 Z" fill="#ff80ab" opacity="0.9" />
</svg>
