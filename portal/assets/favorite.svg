<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffebee" />
      <stop offset="100%" stop-color="#ffccd2" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="100%" height="100%" rx="24" fill="url(#bgGrad)" />

  <!-- Main Heart -->
  <path d="M 200 230 C 120 180, 70 120, 70 80 C 70 40, 110 10, 150 10 C 175 10, 192 25, 200 35 C 208 25, 225 10, 250 10 C 290 10, 330 40, 330 80 C 330 120, 280 180, 200 230 Z" fill="#ff4081" filter="url(#glow)" />

  <!-- Hugging Hands / Inner Details -->
  <path d="M 200 220 C 130 175, 85 125, 85 85 C 85 50, 120 25, 150 25 C 170 25, 188 38, 200 50 C 212 38, 230 25, 250 25 C 280 25, 315 50, 315 85 C 315 125, 270 175, 200 220 Z" fill="#ff1744" opacity="0.8" />

  <!-- Sparkles -->
