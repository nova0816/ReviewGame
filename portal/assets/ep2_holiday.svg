<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 375" width="100%" height="100%">
  <defs>
    <!-- Sky Gradient -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4fc3f7" />
      <stop offset="60%" stop-color="#b2ebf2" />
      <stop offset="100%" stop-color="#e0f7fa" />
    </linearGradient>
    <!-- Ocean Gradient -->
    <linearGradient id="oceanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00bcd4" />
      <stop offset="100%" stop-color="#00838f" />
    </linearGradient>
    <!-- Sand Gradient -->
    <linearGradient id="sandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe082" />
      <stop offset="100%" stop-color="#ffca28" />
    </linearGradient>
    <!-- Sun Glow -->
    <filter id="sunGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <!-- Soft Shadow -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#5d4037" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="500" height="375" rx="28" fill="url(#skyGrad)" />

  <!-- Sun with Glow -->
  <g filter="url(#sunGlow)">
    <circle cx="80" cy="75" r="42" fill="#ffeb3b" />
    <circle cx="80" cy="75" r="35" fill="#fbc02d" />
  </g>

  <!-- Cute Fluffy Clouds -->
  <g fill="#ffffff" opacity="0.9">
    <path d="M 220 70 C 220 55, 240 45, 260 55 C 270 45, 295 50, 300 65 C 315 65, 320 80, 310 90 C 310 90, 210 90, 220 70 Z" />
    <path d="M 380 95 C 380 83, 395 75, 410 83 C 420 75, 440 80, 445 90 C 455 90, 460 102, 450 110 C 450 110, 370 110, 380 95 Z" opacity="0.75" />
  </g>

  <!-- Ocean Waves -->
  <path d="M 0 170 Q 125 150, 250 170 T 500 170 L 500 230 L 0 230 Z" fill="url(#oceanGrad)" opacity="0.85" />
  <path d="M 0 185 Q 125 195, 250 185 T 500 185 L 500 240 L 0 240 Z" fill="#26c6da" opacity="0.6" />
  <!-- Wave Foam -->
  <path d="M 0 200 Q 60 190, 120 200 T 240 200 T 360 200 T 480 200" stroke="#ffffff" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.8" />

  <!-- Beach Sand Slope -->
  <path d="M 0 215 Q 250 195, 500 225 L 500 375 L 0 375 Z" fill="url(#sandGrad)" />

  <!-- Detailed Lush Palm Tree -->
  <g filter="url(#dropShadow)">
    <!-- Curved Bark Trunk -->
    <path d="M 420 375 C 410 280, 440 180, 410 100 C 405 100, 390 100, 395 375 Z" fill="#8d6e63" />
    <path d="M 415 375 C 405 280, 435 180, 405 100" stroke="#5d4037" stroke-width="3" fill="none" stroke-dasharray="10 8" />
    <!-- Coconuts -->
    <circle cx="395" cy="105" r="11" fill="#4e342e" />
    <circle cx="412" cy="108" r="10" fill="#3e2723" />
    <circle cx="402" cy="118" r="9" fill="#5d4037" />
    <!-- Palm Leaves -->
    <!-- Leaf 1 (Left) -->
    <path d="M 405 100 C 330 60, 270 90, 240 130 C 280 120, 340 115, 405 100 Z" fill="#4caf50" />
    <path d="M 405 100 C 330 60, 270 90, 240 130" stroke="#2e7d32" stroke-width="3" fill="none" />
    <!-- Leaf 2 (Top Left) -->
    <path d="M 405 100 C 360 30, 300 20, 260 40 C 300 55, 360 70, 405 100 Z" fill="#66bb6a" />
    <!-- Leaf 3 (Top Right) -->
    <path d="M 405 100 C 440 30, 480 40, 495 60 C 470 70, 430 85, 405 100 Z" fill="#4caf50" />
    <!-- Leaf 4 (Right) -->
    <path d="M 405 100 C 460 90, 495 120, 500 150 C 470 140, 430 125, 405 100 Z" fill="#81c784" />
  </g>

  <!-- Detailed Cute Sandcastle -->
  <g filter="url(#dropShadow)">
    <!-- Base Walls -->
    <rect x="230" y="250" width="130" height="75" rx="8" fill="#ffd54f" stroke="#ffb300" stroke-width="4" />
    <!-- Wall Crenellations -->
    <rect x="235" y="240" width="15" height="15" fill="#ffd54f" stroke="#ffb300" stroke-width="3" />
    <rect x="260" y="240" width="15" height="15" fill="#ffd54f" stroke="#ffb300" stroke-width="3" />
    <rect x="285" y="240" width="15" height="15" fill="#ffd54f" stroke="#ffb300" stroke-width="3" />
    <rect x="310" y="240" width="15" height="15" fill="#ffd54f" stroke="#ffb300" stroke-width="3" />
    <rect x="335" y="240" width="15" height="15" fill="#ffd54f" stroke="#ffb300" stroke-width="3" />
    <!-- Center Tower -->
    <rect x="265" y="195" width="60" height="55" rx="6" fill="#ffe082" stroke="#ffb300" stroke-width="4" />
    <!-- Cone Roof -->
    <path d="M 255 195 L 295 150 L 335 195 Z" fill="#ff7043" stroke="#d84315" stroke-width="3" />
    <!-- Red Flag -->
    <line x1="295" y1="150" x2="295" y2="120" stroke="#5d4037" stroke-width="4" stroke-linecap="round" />
    <path d="M 295 120 L 325 132 L 295 144 Z" fill="#ff1744" />
    <!-- Castle Door -->
    <path d="M 280 325 L 280 290 C 280 275, 310 275, 310 290 L 310 325 Z" fill="#6d4c41" stroke="#3e2723" stroke-width="3" />
  </g>

  <!-- Cute Cartoon Child Character playing on Beach -->
  <g filter="url(#dropShadow)">
    <!-- Shadow under child -->
    <ellipse cx="120" cy="335" rx="35" ry="10" fill="#d7ccc8" />
    <!-- Legs -->
    <rect x="105" y="300" width="12" height="30" rx="6" fill="#ffcc80" />
    <rect x="123" y="300" width="12" height="30" rx="6" fill="#ffcc80" />
    <!-- Feet -->
    <ellipse cx="111" cy="330" rx="10" ry="5" fill="#ffb74d" />
    <ellipse cx="129" cy="330" rx="10" ry="5" fill="#ffb74d" />
    <!-- Swimsuit -->
    <path d="M 95 245 C 95 235, 145 235, 145 245 L 140 305 L 100 305 Z" fill="#29b6f6" stroke="#0288d1" stroke-width="3" />
    <!-- Striped Swimsuit Pattern -->
    <path d="M 97 260 L 143 260 M 98 280 L 142 280 M 99 295 L 141 295" stroke="#ffffff" stroke-width="4" />
    <!-- Arms -->
    <path d="M 95 245 C 75 260, 70 280, 85 290" stroke="#ffcc80" stroke-width="12" stroke-linecap="round" fill="none" />
    <path d="M 145 245 C 165 260, 175 275, 185 270" stroke="#ffcc80" stroke-width="12" stroke-linecap="round" fill="none" />
    <!-- Red Toy Bucket in Hand -->
    <path d="M 175 265 L 195 265 L 190 295 L 180 295 Z" fill="#e53935" stroke="#b71c1c" stroke-width="3" />

    <!-- Cute Head -->
    <circle cx="120" cy="195" r="34" fill="#ffcc80" />
    <!-- Rosy Cheeks -->
    <circle cx="98" cy="205" r="7" fill="#ff8a80" opacity="0.7" />
    <circle cx="142" cy="205" r="7" fill="#ff8a80" opacity="0.7" />
    <!-- Big Sparkling Eyes -->
    <circle cx="107" cy="195" r="6" fill="#263238" />
    <circle cx="105" cy="193" r="2" fill="#ffffff" />
    <circle cx="133" cy="195" r="6" fill="#263238" />
    <circle cx="131" cy="193" r="2" fill="#ffffff" />
    <!-- Happy Smile -->
    <path d="M 112 212 Q 120 222, 128 212" stroke="#d84315" stroke-width="3.5" fill="none" stroke-linecap="round" />

    <!-- Yellow Sun Hat -->
    <path d="M 80 180 Q 120 160, 160 180" stroke="#fbc02d" stroke-width="10" fill="none" stroke-linecap="round" />
    <path d="M 95 175 C 95 145, 145 145, 145 175 Z" fill="#ffee58" stroke="#fbc02d" stroke-width="4" />
    <path d="M 96 172 Q 120 166, 144 172" stroke="#e91e63" stroke-width="5" fill="none" />
  </g>

  <!-- Cute Starfish on Sand -->
  <g filter="url(#dropShadow)">
    <path d="M 50 330 L 55 315 L 68 318 L 58 328 L 65 340 L 52 335 L 42 342 L 46 329 L 35 321 L 48 320 Z" fill="#ff7043" stroke="#f4511e" stroke-width="2" />
    <circle cx="50" cy="328" r="1.5" fill="#37474f" />
    <circle cx="55" cy="329" r="1.5" fill="#37474f" />
  </g>

  <!-- Cute Seashell -->
  <path d="M 390 330 C 375 320, 375 345, 390 345 C 405 345, 405 320, 390 330 Z" fill="#f8bbd0" stroke="#c2185b" stroke-width="2" />
</svg>
