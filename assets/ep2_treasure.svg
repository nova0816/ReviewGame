<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 375" width="100%" height="100%">
  <defs>
    <linearGradient id="bgTreasure" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff8e1" />
      <stop offset="50%" stop-color="#ffecb3" />
      <stop offset="100%" stop-color="#ffe082" />
    </linearGradient>
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="shadowTreasure" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#3e2723" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="375" rx="28" fill="url(#bgTreasure)" />

  <!-- Magical Sunburst Light Rays behind treasure -->
  <g opacity="0.35">
    <polygon points="250,180 100,0 150,0" fill="#ffd54f" />
    <polygon points="250,180 350,0 400,0" fill="#ffd54f" />
    <polygon points="250,180 500,100 500,150" fill="#ffd54f" />
    <polygon points="250,180 500,250 500,300" fill="#ffd54f" />
    <polygon points="250,180 0,100 0,150" fill="#ffd54f" />
    <polygon points="250,180 0,250 0,300" fill="#ffd54f" />
  </g>

  <!-- Cute Treasure Box Base -->
  <g filter="url(#shadowTreasure)">
    <!-- Wooden Box Structure -->
    <rect x="110" y="180" width="280" height="130" rx="16" fill="#8d6e63" stroke="#4e342e" stroke-width="6" />
    <!-- Metallic Gold Bands -->
    <rect x="140" y="180" width="20" height="130" fill="#ffca28" stroke="#ff8f00" stroke-width="3" />
    <rect x="340" y="180" width="20" height="130" fill="#ffca28" stroke="#ff8f00" stroke-width="3" />
    <!-- Lock / Keyhole -->
    <circle cx="250" cy="225" r="16" fill="#ffca28" stroke="#ff8f00" stroke-width="4" />
    <path d="M 250 217 L 250 227 M 250 227 L 246 235 L 254 235 Z" stroke="#5d4037" stroke-width="3" fill="#5d4037" />
  </g>

  <!-- Open Lid (Angled Back) -->
  <g filter="url(#shadowTreasure)">
    <path d="M 90 180 Q 250 80, 410 180 Q 250 120, 90 180 Z" fill="#a1887f" stroke="#4e342e" stroke-width="6" />
    <path d="M 120 160 Q 250 95, 380 160" stroke="#ffca28" stroke-width="6" fill="none" />
  </g>

  <!-- Glowing Overflowing Treasures Inside -->
  <g filter="url(#goldGlow)">
    <!-- Gold Coins Stack -->
    <circle cx="170" cy="170" r="18" fill="#ffd54f" stroke="#ff8f00" stroke-width="3" />
    <circle cx="190" cy="165" r="22" fill="#ffca28" stroke="#ff8f00" stroke-width="3" />
    <circle cx="215" cy="172" r="19" fill="#ffd54f" stroke="#ff8f00" stroke-width="3" />
    <circle cx="290" cy="170" r="20" fill="#ffca28" stroke="#ff8f00" stroke-width="3" />
    <circle cx="320" cy="168" r="18" fill="#ffd54f" stroke="#ff8f00" stroke-width="3" />

    <!-- Toy Robot in Treasure -->
    <rect x="230" y="125" width="40" height="45" rx="6" fill="#42a5f5" stroke="#1565c0" stroke-width="3" />
    <circle cx="250" cy="110" r="14" fill="#64b5f6" stroke="#1565c0" stroke-width="3" />
    <circle cx="244" cy="108" r="3" fill="#ffffff" />
    <circle cx="256" cy="108" r="3" fill="#ffffff" />

    <!-- Shiny Diamond Gem -->
    <polygon points="140,150 155,135 170,150 155,170" fill="#29b6f6" stroke="#0288d1" stroke-width="3" />

    <!-- Bright Magical Sparkles -->
    <path d="M 250 50 L 255 68 L 273 73 L 255 78 L 250 96 L 245 78 L 227 73 L 245 68 Z" fill="#ffffff" />
    <path d="M 130 90 L 133 100 L 143 103 L 133 106 L 130 116 L 127 106 L 117 103 L 127 100 Z" fill="#ffffff" />
    <path d="M 370 80 L 373 90 L 383 93 L 373 96 L 370 106 L 367 96 L 357 93 L 367 90 Z" fill="#ffffff" />
  </g>
</svg>
