<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="bgTreasure" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff8e1" />
      <stop offset="100%" stop-color="#ffecb3" />
    </linearGradient>
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="100%" height="100%" rx="24" fill="url(#bgTreasure)" />
  <!-- Chest Base -->
  <path d="M 80 140 L 320 140 L 300 240 L 100 240 Z" fill="#8d6e63" stroke="#5d4037" stroke-width="8" />
  <!-- Open Lid -->
  <path d="M 70 140 C 70 80, 330 80, 330 140 Z" fill="#a1887f" stroke="#5d4037" stroke-width="8" />
  <!-- Gold Coins inside -->
  <g filter="url(#goldGlow)">
    <circle cx="160" cy="130" r="20" fill="#ffd54f" stroke="#ffb300" stroke-width="4" />
    <circle cx="200" cy="120" r="24" fill="#ffca28" stroke="#ffb300" stroke-width="4" />
    <circle cx="240" cy="135" r="18" fill="#ffd54f" stroke="#ffb300" stroke-width="4" />
    <!-- Sparkles -->
    <path d="M 200 60 L 204 70 L 214 74 L 204 78 L 200 88 L 196 78 L 186 74 L 196 70 Z" fill="#fff" />
    <path d="M 120 90 L 122 95 L 127 97 L 122 99 L 120 104 L 118 99 L 113 97 L 118 95 Z" fill="#fff" />
  </g>
</svg>
