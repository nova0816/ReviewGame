<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 375" width="100%" height="100%">
  <defs>
    <linearGradient id="bgRemainSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#81c784" />
      <stop offset="30%" stop-color="#4caf50" />
      <stop offset="30%" stop-color="#8d6e63" />
      <stop offset="100%" stop-color="#4e342e" />
    </linearGradient>
    <filter id="shadowRemain" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#212121" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Background Split: Above ground Grass & Underground Soil -->
  <rect width="500" height="375" rx="28" fill="url(#bgRemainSky)" />

  <!-- Grass Blades on Surface -->
  <path d="M 30 115 L 40 95 L 50 115 M 100 115 L 110 90 L 120 115 M 200 115 L 210 92 L 220 115 M 350 115 L 360 95 L 370 115 M 440 115 L 450 90 L 460 115" stroke="#2e7d32" stroke-width="5" stroke-linecap="round" fill="none" />

  <!-- Cute Big Tree above surface -->
  <g filter="url(#shadowRemain)">
    <!-- Trunk -->
    <rect x="230" y="20" width="40" height="100" fill="#6d4c41" stroke="#3e2723" stroke-width="4" />
    <!-- Leaf Canopy -->
    <circle cx="250" cy="35" r="50" fill="#66bb6a" stroke="#2e7d32" stroke-width="5" />
    <circle cx="210" cy="45" r="35" fill="#4caf50" stroke="#2e7d32" stroke-width="4" />
    <circle cx="290" cy="45" r="35" fill="#81c784" stroke="#2e7d32" stroke-width="4" />
  </g>

  <!-- Cute Underground Tree Roots -->
  <g stroke="#3e2723" stroke-width="8" stroke-linecap="round" fill="none">
    <path d="M 230 115 C 180 140, 120 180, 80 260" />
    <path d="M 270 115 C 320 140, 380 180, 420 260" />
    <path d="M 250 115 L 250 190" stroke-width="10" />
  </g>

  <!-- Time Capsule Box Remaining Undisturbed Underground -->
  <g filter="url(#shadowRemain)">
    <!-- Metal Capsule Body -->
    <rect x="170" y="210" width="160" height="100" rx="18" fill="#b0bec5" stroke="#37474f" stroke-width="6" />
    <!-- Shiny Metallic Band -->
    <rect x="200" y="210" width="20" height="100" fill="#78909c" />
    <rect x="280" y="210" width="20" height="100" fill="#78909c" />
    <!-- Gold Emblem / Clock Symbol -->
    <circle cx="250" cy="260" r="20" fill="#ffd54f" stroke="#ffb300" stroke-width="4" />
    <polyline points="250,248 250,260 258,260" stroke="#5d4037" stroke-width="3" stroke-linecap="round" fill="none" />
  </g>

  <!-- Cute Little Earthworm Sleeping Nearby -->
  <g filter="url(#shadowRemain)">
    <path d="M 100 290 Q 115 275, 130 290 T 160 290" stroke="#ff8a80" stroke-width="10" stroke-linecap="round" fill="none" />
    <!-- Sleeping Eyes Zzz -->
    <circle cx="103" cy="287" r="1.5" fill="#37474f" />
    <text x="145" y="275" font-family="sans-serif" font-weight="bold" font-size="12" fill="#ff8a80">zZ</text>
  </g>
</svg>
