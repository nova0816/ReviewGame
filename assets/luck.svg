<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8f5e9" />
      <stop offset="100%" stop-color="#c8e6c9" />
    </linearGradient>
    <filter id="glowGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="100%" height="100%" rx="24" fill="url(#bgGradGreen)" />

  <!-- Four Leaf Clover (Luck) -->
  <g transform="translate(200, 135)" filter="url(#glowGreen)">
    <!-- Stem -->
    <path d="M 0 0 C 10 40, 20 80, 10 110" fill="none" stroke="#2e7d32" stroke-width="12" stroke-linecap="round" />
    <!-- Leaf 1 (Top) -->
    <path d="M 0 0 C -35 -40, -25 -70, 0 -70 C 25 -70, 35 -40, 0 0 Z" fill="#4caf50" />
    <path d="M 0 0 C -25 -30, -15 -55, 0 -55 C 15 -55, 25 -30, 0 0 Z" fill="#81c784" />
    <!-- Leaf 2 (Right) -->
    <path d="M 0 0 C 40 -35, 70 -25, 70 0 C 70 25, 40 35, 0 0 Z" fill="#4caf50" />
    <path d="M 0 0 C 30 -25, 55 -15, 55 0 C 55 25, 30 35, 0 0 Z" fill="#81c784" />
    <!-- Leaf 3 (Bottom) -->
    <path d="M 0 0 C 35 40, 25 70, 0 70 C -25 70, -35 40, 0 0 Z" fill="#4caf50" />
    <path d="M 0 0 C 25 30, 15 55, 0 55 C -15 55, -25 30, 0 0 Z" fill="#81c784" />
    <!-- Leaf 4 (Left) -->
    <path d="M 0 0 C -40 35, -70 25, -70 0 C -70 -25, -40 -35, 0 0 Z" fill="#4caf50" />
    <path d="M 0 0 C -30 25, -55 15, -55 0 C -55 -25, -30 -35, 0 0 Z" fill="#81c784" />
  </g>

  <!-- Sparkles / Little stars -->
  <path d="M 80 70 L 83 76 L 90 79 L 83 82 L 80 88 L 77 82 L 70 79 L 77 76 Z" fill="#fff" opacity="0.95" />
  <path d="M 310 70 L 313 76 L 320 79 L 313 82 L 310 88 L 307 82 L 300 79 L 307 76 Z" fill="#fff" opacity="0.95" />
  <path d="M 310 200 L 312 204 L 317 206 L 312 208 L 310 212 L 308 208 L 303 206 L 308 204 Z" fill="#fff" opacity="0.9" />
  <path d="M 90 200 L 92 204 L 97 206 L 92 208 L 90 212 L 88 208 L 83 206 L 88 204 Z" fill="#fff" opacity="0.9" />
</svg>
